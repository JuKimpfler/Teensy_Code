; ============================================================
;  PlatformIO  –  ESP32-C3 UART-Bridge via ESP-NOW
;  Seeed Studio XIAO ESP32-C3
; ============================================================

[platformio]
default_envs = uart_bridge

; ------------------------------------------------------------
;  Gemeinsame Einstellungen (beide ESPs identische Firmware)
; ------------------------------------------------------------
[env:uart_bridge]
platform          = espressif32
board             = seeed_xiao_esp32c3
framework         = arduino

; USB-CDC für Serial.print() / Befehle aktivieren
build_flags       =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Monitor-Einstellungen
monitor_speed     = 115200
monitor_filters   = colorize, time

; Upload-Einstellungen
upload_speed      = 921600

; Optional: automatisch nach dem Flash öffnen
; monitor_port    = COM3   ; ← anpassen falls nötig

; Bibliotheken (alle im ESP32-Arduino-Core enthalten)
; lib_deps =   ; keine externen Libs benötigt
