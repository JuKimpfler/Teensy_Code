name: Update Changes Log

on:
  push:
    branches:
      - '**'

concurrency:
  group: changes-md-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip if the commit was made by this workflow itself to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and append change summary
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          BRANCH="${{ github.ref_name }}"

          # Get list of changed files and stats (handle root commit with no parent)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-status HEAD~1 HEAD)
            FILE_STATS=$(git diff --stat HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff-tree --root --name-status -r HEAD)
            FILE_STATS=$(git diff-tree --root --stat HEAD | tail -n +2)
          fi

          # Create changes.md if it doesn't exist
          if [ ! -f changes.md ]; then
            printf '# Änderungshistorie\n\nDiese Datei enthält eine automatisch generierte Historie aller Commits.\n\n' > changes.md
          fi

          # Append the new entry using printf to handle special characters safely
          {
            printf '## Commit `%s` – %s\n\n' "${COMMIT_SHORT}" "${COMMIT_TIMESTAMP}"
            printf '**Branch:** `%s`\n' "${BRANCH}"
            printf '**Author:** %s\n' "${COMMIT_AUTHOR}"
            printf '**Message:** %s\n\n' "${COMMIT_MSG}"
            printf '### Geänderte Dateien\n```\n%s\n```\n\n' "${CHANGED_FILES}"
            printf '### Zusammenfassung\n```\n%s\n```\n\n' "${FILE_STATS}"
            printf -- '---\n\n'
          } >> changes.md

      - name: Commit updated changes.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changes.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update changes.md for commit ${{ github.sha }} [skip ci]"
            git push
          fi
