sync-from-github:
  image: alpine:latest        # ← Statt alpine/git
  before_script:
    - apk add --no-cache git  # ← Git nachinstallieren
  rules:
    - when: manual
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - git config --global user.email "ci@gitlab.local"
    - git config --global user.name "GitLab CI"
    - git remote add github https://oauth2:$GITHUB_TOKEN@github.com/JuKimpfler/Teensy_Code.git
    - git fetch github
    - git checkout -B master origin/master
    - git merge github/master --allow-unrelated-histories -m "Auto-sync from GitHub" || true
    - git push https://oauth2:$GITLAB_TOKEN@git.markdorf-robotics.de/koalas/2vs2_soccer/teensy_code.git HEAD:master